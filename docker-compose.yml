version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: thrivo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thrivo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - thrivo-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: thrivo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - thrivo-network
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thrivo-api
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/thrivo?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 5000
    depends_on:
      - postgres
      - redis
    networks:
      - thrivo-network
    restart: always

volumes:
  postgres_data:
  redis_data:

networks:
  thrivo-network:
    driver: bridge
